<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Sahil Social</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#1a1a1a;--s3:#222;
  --bd:#2a2a2a;--a:#7c4dff;--a2:#ff4db8;
  --t:#f0f0f0;--t2:#888;--t3:#444;
  --green:#25d366;--red:#ff5566;--yellow:#ffcc44;--blue:#1da1f2;
  --fn:'Nunito',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--fn);margin:0}
#root{width:100vw;height:100vh;overflow:hidden}
.loading{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);flex-direction:column;gap:16px}
.spinner{width:44px;height:44px;border-radius:50%;border:3px solid var(--bd);border-top-color:var(--a);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--t2);font-size:14px}

/* AUTH */
.auth-screen{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0a,#1a0a2e);padding:16px;overflow-y:auto}
.auth-box{width:100%;max-width:380px;background:var(--s1);border:1px solid #2a1a4e;border-radius:24px;padding:30px 22px;box-shadow:0 20px 60px rgba(124,77,255,.2)}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo .logo{font-size:48px;margin-bottom:8px}
.auth-logo h1{font-size:26px;font-weight:900;background:linear-gradient(90deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-logo p{font-size:12px;color:var(--t2);margin-top:4px}
.google-btn{width:100%;padding:13px;border-radius:13px;border:1px solid #3a3a3a;background:var(--s2);color:var(--t);font-family:var(--fn);font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;margin-bottom:14px}
.google-btn:hover{border-color:var(--a)}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.divider-line{flex:1;height:1px;background:var(--bd)}
.divider-text{font-size:12px;color:var(--t3);font-weight:700}
.tabs{display:flex;gap:4px;background:var(--s2);padding:4px;border-radius:12px;margin-bottom:16px}
.tab{flex:1;padding:8px;border-radius:9px;border:none;background:transparent;color:var(--t2);font-family:var(--fn);font-size:13px;font-weight:800;cursor:pointer;transition:all .2s}
.tab.on{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;font-weight:800;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px}
.field input{width:100%;padding:11px 13px;background:var(--s2);border:1px solid var(--bd);border-radius:11px;color:var(--t);font-family:var(--fn);font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(124,77,255,.1)}
.field input::placeholder{color:var(--t3)}
.field-hint{font-size:10px;color:var(--t3);margin-top:4px}
.err{font-size:12px;color:var(--red);background:rgba(255,85,102,.08);border:1px solid rgba(255,85,102,.2);border-radius:9px;padding:8px 12px;margin-bottom:12px}
.auth-btn{width:100%;padding:13px;border-radius:13px;border:none;background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;font-family:var(--fn);font-size:15px;font-weight:900;cursor:pointer;transition:transform .15s;box-shadow:0 6px 20px rgba(124,77,255,.4);margin-top:4px}
.auth-btn:hover{transform:translateY(-2px)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* APP */
.app{width:100vw;height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.topbar{height:52px;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:20}
.topbar h2{font-size:18px;font-weight:900;background:linear-gradient(90deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1}
.icon-btn{width:34px;height:34px;border-radius:50%;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center}
.back-icon-btn{width:34px;height:34px;border-radius:50%;border:none;background:transparent;color:var(--a);cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center}
.bottom-nav{height:54px;background:var(--s1);border-top:1px solid var(--bd);display:flex;flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;color:var(--t3);cursor:pointer;font-family:var(--fn);font-size:9px;font-weight:700;transition:color .2s}
.nav-btn.on{color:var(--a)}
.nav-icon{font-size:22px;line-height:1}
.screen{flex:1;overflow-y:auto;overflow-x:hidden}
.screen::-webkit-scrollbar{width:0}

/* STORIES */
.stories-wrap{display:flex;gap:10px;padding:12px 14px;overflow-x:auto;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0}
.stories-wrap::-webkit-scrollbar{height:0}
.story-item{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer}
.story-ring{width:60px;height:60px;border-radius:50%;padding:2px}
.story-ring.unseen{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.story-ring.seen{background:var(--bd)}
.story-ring.mine{background:linear-gradient(135deg,var(--a),var(--a2))}
.story-av{width:100%;height:100%;border-radius:50%;background:var(--s2);border:2px solid var(--s1);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
.story-av img{width:100%;height:100%;object-fit:cover}
.story-name{font-size:10px;color:var(--t2);font-weight:700;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.add-story-icon{background:linear-gradient(135deg,var(--a),var(--a2));border-radius:50%;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px}

/* POSTS */
.post-card{background:var(--s1);border-bottom:2px solid var(--bg)}
.post-header{display:flex;align-items:center;gap:10px;padding:10px 14px}
.post-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;overflow:hidden}
.post-av img{width:100%;height:100%;object-fit:cover}
.post-uname{font-size:13px;font-weight:900;color:var(--t);cursor:pointer;display:flex;align-items:center;gap:3px}
.blue-tick{color:var(--blue);font-size:13px}
.crown{font-size:12px}
.post-loc{font-size:11px;color:var(--t2)}
.post-more{margin-left:auto;background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer;padding:4px}
.post-media{width:100%;aspect-ratio:1;background:var(--s2);overflow:hidden;cursor:pointer}
.post-media img,.post-media video{width:100%;height:100%;object-fit:cover}
.post-actions{display:flex;align-items:center;gap:4px;padding:8px 14px 4px}
.action-btn{background:none;border:none;font-size:24px;cursor:pointer;padding:4px;transition:transform .15s;color:var(--t)}
.action-btn:hover{transform:scale(1.15)}
.save-btn{margin-left:auto}
.post-likes{font-size:13px;font-weight:800;color:var(--t);padding:0 14px 4px}
.post-caption{font-size:13px;color:var(--t);padding:0 14px 4px;line-height:1.5}
.post-caption b{font-weight:900}
.post-time{font-size:11px;color:var(--t3);padding:0 14px 10px}
.view-cmts{font-size:12px;color:var(--t2);padding:0 14px 6px;cursor:pointer}
.admin-del-btn{background:rgba(255,85,102,.1);border:1px solid rgba(255,85,102,.3);color:var(--red);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:800;cursor:pointer;margin:0 14px 8px}

/* SEARCH */
.search-bar{padding:10px 14px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--bd)}
.search-input{width:100%;padding:10px 16px;background:var(--s2);border:1px solid var(--bd);border-radius:22px;color:var(--t);font-family:var(--fn);font-size:14px;outline:none}
.search-input::placeholder{color:var(--t3)}
.people-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid #151515;cursor:pointer}
.people-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.people-av img{width:100%;height:100%;object-fit:cover}
.people-uname{font-size:14px;font-weight:900;color:var(--t);display:flex;align-items:center;gap:3px}
.people-name{font-size:12px;color:var(--t2);margin-top:1px}
.people-fol{font-size:11px;color:var(--t3);margin-top:1px}
.mini-follow-btn{padding:6px 14px;border-radius:20px;border:none;font-family:var(--fn);font-size:12px;font-weight:800;cursor:pointer;flex-shrink:0}
.btn-follow{background:var(--a);color:#fff}
.btn-following{background:var(--s2);border:1px solid var(--bd)!important;color:var(--t2)}

/* PROFILE */
.prof-cover{height:100px;background:linear-gradient(135deg,var(--a),var(--a2));position:relative}
.prof-av-wrap{position:absolute;bottom:-30px;left:16px}
.prof-pic{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:34px;border:3px solid var(--bg);flex-shrink:0;overflow:hidden}
.prof-pic img{width:100%;height:100%;object-fit:cover}
.prof-body{padding:44px 16px 12px}
.prof-name-row{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.prof-name{font-size:16px;font-weight:900;color:var(--t)}
.prof-uname-tag{font-size:12px;color:var(--t2);margin-bottom:6px}
.prof-bio{font-size:13px;color:var(--t);line-height:1.5;margin-bottom:10px}
.prof-stats{display:flex;gap:0;margin-bottom:12px}
.stat-item{flex:1;text-align:center;cursor:pointer;padding:6px 0;border-radius:10px;transition:background .2s}
.stat-item:hover{background:var(--s2)}
.stat-num{font-size:18px;font-weight:900;color:var(--t);display:block}
.stat-lbl{font-size:11px;color:var(--t2)}
.prof-btns{display:flex;gap:8px;margin-bottom:14px}
.prof-btn{flex:1;padding:8px;border-radius:10px;border:1px solid var(--bd);background:var(--s2);color:var(--t);font-family:var(--fn);font-size:13px;font-weight:800;cursor:pointer}
.prof-btn.follow-btn-p{background:var(--a);border-color:var(--a);color:#fff}
.highlights-wrap{display:flex;gap:14px;padding:0 14px 14px;overflow-x:auto}
.highlights-wrap::-webkit-scrollbar{height:0}
.highlight-item{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer}
.highlight-ring{width:58px;height:58px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--s2);overflow:hidden}
.highlight-ring img{width:100%;height:100%;object-fit:cover}
.highlight-name{font-size:10px;color:var(--t2);font-weight:700;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;border-top:1px solid var(--bd)}
.grid-post{aspect-ratio:1;background:var(--s2);overflow:hidden;cursor:pointer;position:relative}
.grid-post img,.grid-post video{width:100%;height:100%;object-fit:cover}
.grid-post-ov{position:absolute;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;gap:8px;color:#fff;font-size:13px;font-weight:800}
.grid-post:hover .grid-post-ov{display:flex}

/* FOLLOWERS/FOLLOWING LIST */
.user-list-screen{position:fixed;inset:0;background:var(--bg);z-index:150;display:flex;flex-direction:column}
.user-list-hdr{height:52px;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.user-list-hdr h3{font-size:16px;font-weight:900;color:var(--t);flex:1;text-align:center}

/* MESSAGES */
.chat-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #151515;cursor:pointer}
.chat-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.chat-av img{width:100%;height:100%;object-fit:cover}
.chat-uname{font-size:14px;font-weight:900;color:var(--t)}
.chat-prev{font-size:12px;color:var(--t2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.room-hdr{height:52px;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0}
.room-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden;cursor:pointer}
.room-av img{width:100%;height:100%;object-fit:cover}
.room-uname{font-size:14px;font-weight:900;color:var(--t)}
.room-status{font-size:11px;color:var(--green)}
.messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;background:var(--bg)}
.messages::-webkit-scrollbar{width:0}
.msg-w{display:flex;flex-direction:column;max-width:75%}
.msg-w.me{align-self:flex-end;align-items:flex-end}
.msg-w.other{align-self:flex-start;align-items:flex-start}
.msg-bbl{padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word}
.msg-w.me .msg-bbl{background:linear-gradient(135deg,var(--a),#5c2dff);color:#fff;border-bottom-right-radius:4px}
.msg-w.other .msg-bbl{background:var(--s2);color:var(--t);border-bottom-left-radius:4px;border:1px solid var(--bd)}
.msg-img{max-width:180px;border-radius:12px;cursor:pointer;display:block;margin-top:2px}
.msg-time{font-size:10px;color:var(--t3);padding:2px 4px}
.msg-input-area{display:flex;gap:8px;align-items:flex-end;padding:8px 12px 10px;background:var(--s1);border-top:1px solid var(--bd);flex-shrink:0}
.attach-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--bd);background:var(--s2);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.msg-input{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:22px;padding:9px 15px;color:var(--t);font-family:var(--fn);font-size:14px;outline:none;resize:none;max-height:100px;line-height:1.4;transition:border-color .2s}
.msg-input:focus{border-color:var(--a)}
.msg-input::placeholder{color:var(--t3)}
.send-btn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{width:100%;max-width:500px;background:var(--s1);border-radius:24px 24px 0 0;padding:22px;border-top:1px solid var(--bd);max-height:85vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:900;color:var(--t);margin-bottom:16px}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.modal-btn{flex:1;padding:12px;border-radius:12px;border:none;font-family:var(--fn);font-size:14px;font-weight:800;cursor:pointer}
.modal-btn.cancel{background:var(--s2);color:var(--t2)}
.modal-btn.confirm{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff}
.edit-field{margin-bottom:14px}
.edit-field label{display:block;font-size:10px;font-weight:800;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px}
.edit-field input,.edit-field textarea{width:100%;padding:11px 13px;background:var(--s2);border:1px solid var(--bd);border-radius:11px;color:var(--t);font-family:var(--fn);font-size:14px;outline:none;resize:none}
.edit-field input:focus,.edit-field textarea:focus{border-color:var(--a)}
.upload-area{border:2px dashed var(--bd);border-radius:16px;padding:24px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:14px}
.upload-area:hover{border-color:var(--a)}
.upload-area .u-icon{font-size:32px;margin-bottom:6px}
.upload-area p{color:var(--t2);font-size:13px}
.upload-prev{width:100%;border-radius:12px;max-height:180px;object-fit:cover;margin-bottom:14px}

/* STORY VIEWER */
.story-viewer{position:fixed;inset:0;background:#000;z-index:500;display:flex;flex-direction:column}
.story-bar{display:flex;gap:3px;padding:10px 12px 4px}
.story-seg{flex:1;height:2px;border-radius:2px;background:rgba(255,255,255,.3)}
.story-seg.done{background:#fff}
.story-top{display:flex;align-items:center;gap:10px;padding:6px 12px}
.story-av-sm{width:36px;height:36px;border-radius:50%;overflow:hidden;background:var(--a);display:flex;align-items:center;justify-content:center}
.story-uname-t{font-size:14px;font-weight:800;color:#fff}
.story-time-t{font-size:11px;color:rgba(255,255,255,.6)}
.story-close{margin-left:auto;background:none;border:none;color:#fff;font-size:24px;cursor:pointer}
.story-body{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
.story-body img,.story-body video{max-width:100%;max-height:100%;object-fit:contain}

/* COMMENTS */
.cmts-screen{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column}
.cmts-hdr{height:52px;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px}
.cmt-item{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid #151515}
.cmt-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;overflow:hidden}
.cmt-av img{width:100%;height:100%;object-fit:cover}
.cmt-uname{font-size:13px;font-weight:900;color:var(--t)}
.cmt-text{font-size:13px;color:var(--t);margin-top:2px;line-height:1.4}
.cmt-time{font-size:11px;color:var(--t3);margin-top:3px}
.cmt-input-area{display:flex;gap:8px;align-items:center;padding:10px 14px;background:var(--s1);border-top:1px solid var(--bd);flex-shrink:0}
.cmt-input{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:22px;padding:9px 15px;color:var(--t);font-family:var(--fn);font-size:14px;outline:none}
.cmt-send{background:none;border:none;color:var(--a);font-size:14px;font-weight:900;cursor:pointer}

/* LIGHTBOX */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:300;display:flex;align-items:center;justify-content:center;cursor:pointer}
.lb img{max-width:95vw;max-height:95vh;border-radius:12px}

/* ADMIN PANEL */
.admin-panel{background:rgba(255,204,68,.06);border:1px solid rgba(255,204,68,.2);border-radius:12px;margin:12px 14px;padding:14px}
.admin-panel h4{font-size:13px;font-weight:900;color:var(--yellow);margin-bottom:10px}
.admin-search{width:100%;padding:9px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;color:var(--t);font-family:var(--fn);font-size:13px;outline:none;margin-bottom:8px}
.admin-user-item{display:flex;align-items:center;gap:8px;padding:6px;border-radius:8px}
.admin-user-item:hover{background:var(--s2)}
.tick-btn{padding:4px 10px;border-radius:8px;border:none;font-family:var(--fn);font-size:11px;font-weight:800;cursor:pointer;transition:all .2s}
.tick-btn.add{background:rgba(29,161,242,.15);border:1px solid rgba(29,161,242,.3);color:var(--blue)}
.tick-btn.rem{background:rgba(255,85,102,.1);border:1px solid rgba(255,85,102,.2);color:var(--red)}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 24px;gap:12px;text-align:center}
.e-icon{font-size:48px;opacity:.4}
.e-text{font-size:14px;color:var(--t3);line-height:1.6}
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="spinner"></div><p>Loading Sahil Social...</p></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

// ── NAVIGATION STACK ──────────────────────────────────────────────────
// Stack stores screen states for proper back navigation
let navStack = []; // [{screen, data}]
let currentScreen = {screen:"feed", data:null};

function pushScreen(screen, data=null) {
  navStack.push({...currentScreen});
  currentScreen = {screen, data};
  render();
}

function popScreen() {
  if(navStack.length > 0) {
    currentScreen = navStack.pop();
    render();
  }
}

// Double click back = pop 2 screens
let lastBackClick = 0;
function handleBack() {
  const now = Date.now();
  if(now - lastBackClick < 300) {
    // Double click — pop 2
    if(navStack.length > 0) navStack.pop();
    if(navStack.length > 0) {
      currentScreen = navStack.pop();
    } else if(navStack.length === 0) {
      currentScreen = {screen:"feed", data:null};
    }
    render();
  } else {
    // Single click — pop 1
    popScreen();
  }
  lastBackClick = now;
}

const fmtTime = ts => { if(!ts) return ""; const d=ts.toDate?ts.toDate():new Date(); return d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); };
const fmtDate = ts => { if(!ts) return ""; const d=ts.toDate?ts.toDate():new Date(); return d.toLocaleDateString(); };

const isFollowing = uid => myData?.following?.includes(uid)||false;
const isAdmin = () => myData?.username === ADMIN_USERNAME;

const avEl = (u, size="46px") => {
  const s = parseInt(size);
  if(u?.photoURL) return `<div style="width:${size};height:${size};border-radius:50%;overflow:hidden;flex-shrink:0"><img src="${u.photoURL}" style="width:100%;height:100%;object-fit:cover"/></div>`;
  return `<div style="width:${size};height:${size};border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:${s/2.2}px;flex-shrink:0">${u?.emoji||"👤"}</div>`;
};

const uploadMedia = async file => {
  const fd=new FormData();
  fd.append("file",file); fd.append("upload_preset",UPLOAD_PRESET); fd.append("cloud_name",CLOUD_NAME);
  const isVid=file.type.startsWith("video/");
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${isVid?"video":"image"}/upload`,{method:"POST",body:fd});
  const data=await res.json();
  if(data.error) throw new Error(data.error.message);
  return {url:data.secure_url,type:isVid?"video":"image"};
};

const unameDisplay = u => {
  if(!u) return "";

};

window.setAuthTab=r=>{authIsReg=r;authErr="";render();};

window.googleLogin=async()=>{
  const btn=document.getElementById("gBtn");
  if(btn){btn.disabled=true;btn.textContent="⏳ Ruko...";}
  try{
    const res=await signInWithPopup(auth,gPro);
    const user=res.user;
    const ref=doc(db,"users",user.uid);
    const snap=await getDoc(ref);
    if(!snap.exists()){
      const emojis=["😎","🤩","🔥","💪","⚡","🌟","🎯","🚀","💎","🦁"];
      const baseUname=(user.displayName||"user").toLowerCase().replace(/[^a-z0-9]/g,"_").slice(0,12);
      const uname=baseUname+"_"+Math.floor(Math.random()*999);
      await setDoc(ref,{name:user.displayName||"User",username:uname,email:user.email,photoURL:user.photoURL||null,emoji:emojis[Math.floor(Math.random()*emojis.length)],bio:"",uid:user.uid,following:[],followers:[],blueTick:false,createdAt:serverTimestamp(),online:true});
    }else{
      await updateDoc(ref,{online:true,photoURL:user.photoURL||null});
    }
  }catch(e){authErr="❌ Google login failed. "+e.message;render();}
};

window.emailAuth=async()=>{
  const btn=document.getElementById("authBtn");
  const email=document.getElementById("emailI")?.value.trim();
  const pass=document.getElementById("passI")?.value;
  const name=document.getElementById("nameI")?.value.trim();
  const uname=document.getElementById("unameI")?.value.trim();
  if(!email||!pass){authErr="❌ Email aur password chahiye!";render();return;}
  if(authIsReg){
    if(!name){authErr="❌ Naam daalo!";render();return;}
    if(!uname||uname.length<3){authErr="❌ Username 3+ chars ka hona chahiye!";render();return;}
  }
  if(btn){btn.disabled=true;btn.textContent="⏳ Ruko...";}
  try{
    const emojis=["😎","🤩","🔥","💪","⚡","🌟","🎯","🚀","💎","🦁","🐯","🦊"];
    if(authIsReg){
      const usnap=await getDocs(query(collection(db,"users"),where("username","==",uname)));
      if(!usnap.empty){authErr="❌ Yeh username already le chuka hai koi!";render();return;}
      const cred=await createUserWithEmailAndPassword(auth,email,pass);
      await updateProfile(cred.user,{displayName:name});
      await setDoc(doc(db,"users",cred.user.uid),{name,username:uname,email,uid:cred.user.uid,photoURL:null,emoji:emojis[Math.floor(Math.random()*emojis.length)],bio:"",following:[],followers:[],blueTick:false,createdAt:serverTimestamp(),online:true});
    }else{
      await signInWithEmailAndPassword(auth,email,pass);
    }
  }catch(e){
    authErr=e.code==="auth/user-not-found"?"❌ User nahi mila! Pehle register karo.":e.code==="auth/wrong-password"?"❌ Password galat hai!":e.code==="auth/email-already-in-use"?"❌ Email already use ho rahi hai!":e.code==="auth/weak-password"?"❌ Password 6+ chars ka hona chahiye!":"❌ "+e.message;
    render();
  }
};

// ── SEARCH ────────────────────────────────────────────────────────────
function renderSearch(){
  const filtered=allUsers.filter(u=>u.id!==cu.uid&&(!searchQ||(u.username||"").includes(searchQ.toLowerCase())||(u.name||"").toLowerCase().includes(searchQ.toLowerCase())));
  let html=`<div class="search-bar"><input class="search-input" placeholder="🔍 @username se search karo..." value="${searchQ}" oninput="updateSearch(this.value)"/></div>`;
  if(!filtered.length)html+=`<div class="empty-state"><div class="e-icon">👥</div><div class="e-text">Koi nahi mila!</div></div>`;
  filtered.forEach(u=>{
    const f=isFollowing(u.id);
    html+=`<div class="people-item" onclick="goProfile('${u.id}')">
      ${avEl(u)}
      <div style="flex:1">
        <div class="people-uname">${unameDisplay(u)}</div>
        <div class="people-name">${u.name}</div>
        <div class="people-fol">${(u.followers||[]).length} followers</div>
      </div>
      <button class="mini-follow-btn ${f?"btn-following":"btn-follow"}" onclick="event.stopPropagation();toggleFollow('${u.id}')">${f?"✓ Following":"+ Follow"}</button>
    </div>`;
  });
  return html;
}
window.updateSearch=q=>{searchQ=q;if(document.getElementById("mainScreen"))document.getElementById("mainScreen").innerHTML=renderSearch();};

  rooms.forEach(r=>{
    const oid=r.type==="dm"?r.members?.find(m=>m!==cu.uid):null;

window.toggleBlueTick=async(uid,hasTick)=>{
  if(!isAdmin()){alert("Sirf admin yeh kar sakta hai!");return;}
  await updateDoc(doc(db,"users",uid),{blueTick:!hasTick});
  const snap=await getDocs(collection(db,"users"));
  allUsers=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(document.getElementById("mainScreen"))document.getElementById("mainScreen").innerHTML=renderMyProfile();
};

window.adminDelPost=async postId=>{
  if(!isAdmin()){alert("Sirf admin yeh kar sakta hai!");return;}
  if(!confirm("Yeh post delete karna chahte ho?"))return;
  await deleteDoc(doc(db,"posts",postId));
  posts=posts.filter(p=>p.id!==postId);
  render();
};

window.toggleFollow=async uid=>{
  const f=isFollowing(uid);
  if(f){
    await updateDoc(doc(db,"users",cu.uid),{following:arrayRemove(uid)});
    await updateDoc(doc(db,"users",uid),{followers:arrayRemove(cu.uid)});
    myData.following=(myData.following||[]).filter(x=>x!==uid);
  }else{
    await updateDoc(doc(db,"users",cu.uid),{following:arrayUnion(uid)});
    await updateDoc(doc(db,"users",uid),{followers:arrayUnion(cu.uid)});
    if(!myData.following)myData.following=[];
    myData.following.push(uid);
  }
  const snap=await getDocs(collection(db,"users"));
  allUsers=snap.docs.map(d=>({id:d.id,...d.data()}));
  myData=allUsers.find(u=>u.id===cu.uid);

};

function renderChatRoom(roomId){
  const r=rooms.find(x=>x.id===roomId)||{id:roomId,members:[cu.uid],type:"dm"};
  const oid=r.type==="dm"?r.members?.find(m=>m!==cu.uid):null;

  const rUname=r.type==="group"?r.name:`@${other.username||other.name||"user"}`;
  root.innerHTML=`
    <div class="app">
      <div class="room-hdr">
        <button class="back-icon-btn" onclick="handleBack()">←</button>
        <div class="room-av" onclick="${oid?`goProfile('${oid}')`:""}">${other.photoURL?`<img src="${other.photoURL}"/>`:r.type==="group"?"👥":other.emoji||"👤"}</div>

      <div class="messages" id="msgList"><div style="text-align:center;color:var(--t3);font-size:13px;padding:20px">Chat shuru karo! 👋</div></div>
      <div id="msgPhotoPrev"></div>

        <button class="attach-btn" onclick="document.getElementById('msgPhotoFile').click()">📎</button>
        <textarea class="msg-input" id="msgInput" placeholder="Message likho..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMsg('${roomId}')">🚀</button>
      </div>
    </div>`;
  listenMsgs(roomId);
}

function listenMsgs(roomId){
  if(msgUnsubs[roomId])msgUnsubs[roomId]();
  const q=query(collection(db,"rooms",roomId,"messages"),orderBy("createdAt"));
  msgUnsubs[roomId]=onSnapshot(q,snap=>{
    const list=document.getElementById("msgList");if(!list)return;
    const msgs=snap.docs.map(d=>({id:d.id,...d.data()}));
    const r=rooms.find(x=>x.id===roomId)||{type:"dm"};
    if(!msgs.length){list.innerHTML=`<div style="text-align:center;color:var(--t3);font-size:13px;padding:20px">Chat shuru karo! 👋</div>`;return;}
    list.innerHTML=msgs.map(m=>{
      const isMe=m.uid===cu.uid;
      const sender=getUser(m.uid);
      return `<div class="msg-w ${isMe?"me":"other"}">
        ${!isMe&&r.type==="group"?`<div style="font-size:11px;color:var(--a);font-weight:700;margin-bottom:3px;padding:0 4px">@${sender.username||sender.name}</div>`:""}
        ${m.img?`<img src="${m.img}" class="msg-img" onclick="openLB('${encodeURIComponent(m.img)}')"/>`:""}
        ${m.text?`<div class="msg-bbl">${m.text}</div>`:""}
        <div class="msg-time">${fmtTime(m.createdAt)}</div>
      </div>`;
    }).join("");
    list.scrollTop=list.scrollHeight;
  });
}

window.handleMsgPhoto=async e=>{
  const file=e.target.files[0];if(!file)return;
  if(file.size>5*1024*1024){alert("Photo 5MB se choti honi chahiye!");return;}
  const reader=new FileReader();
  reader.onload=()=>{
    pendingMsgPhoto=reader.result;
    const area=document.getElementById("msgPhotoPrev");
    if(area)area.innerHTML=`<div style="padding:6px 12px 0;background:var(--s1)"><div style="position:relative;display:inline-block"><img src="${pendingMsgPhoto}" style="width:60px;height:60px;border-radius:10px;object-fit:cover;border:2px solid var(--a)"/><button onclick="removeMsgPhoto()" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:11px;cursor:pointer">×</button></div></div>`;
  };
  reader.readAsDataURL(file);e.target.value="";
};
window.removeMsgPhoto=()=>{pendingMsgPhoto=null;const a=document.getElementById("msgPhotoPrev");if(a)a.innerHTML="";};
window.sendMsg=async roomId=>{
  const input=document.getElementById("msgInput");
  const text=input?.value.trim();
  if(!text&&!pendingMsgPhoto)return;
  input.value="";input.style.height="auto";
  const msgData={uid:cu.uid,name:myData?.name||cu.displayName,createdAt:serverTimestamp()};
  if(text)msgData.text=text;
  if(pendingMsgPhoto){msgData.img=pendingMsgPhoto;pendingMsgPhoto=null;removeMsgPhoto();}
  await addDoc(collection(db,"rooms",roomId,"messages"),msgData);
};
window.handleKey=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();const roomId=currentScreen.data;if(roomId)sendMsg(roomId);}};
window.autoResize=el=>{el.style.height="auto";el.style.height=Math.min(el.scrollHeight,100)+"px";};

async function initApp(){
  const uSnap=await getDocs(collection(db,"users"));
  allUsers=uSnap.docs.map(d=>({id:d.id,...d.data()}));
  myData=allUsers.find(u=>u.id===cu.uid);
  try{await updateDoc(doc(db,"users",cu.uid),{online:true});}catch(e){}

  if(postUnsub)postUnsub();
  postUnsub=onSnapshot(query(collection(db,"posts"),orderBy("createdAt","desc")),snap=>{
    posts=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(currentScreen.screen==="feed")render();
  });

  if(roomUnsub)roomUnsub();
  roomUnsub=onSnapshot(query(collection(db,"rooms"),where("members","array-contains",cu.uid)),snap=>{
    rooms=snap.docs.map(d=>({id:d.id,...d.data()}));
  });

  render();
}

// ── AUTO LOGIN (Persistence) ──────────────────────────────────────────
onAuthStateChanged(auth,async user=>{
  if(user){
    cu=user;
    await initApp();
  }else{
    cu=null;myData=null;allUsers=[];posts=[];rooms=[];
    navStack=[];currentScreen={screen:"feed",data:null};
    if(roomUnsub){roomUnsub();roomUnsub=null;}
    if(postUnsub){postUnsub();postUnsub=null;}
    renderAuth();
  }
});
</script>
</body>
</html>
